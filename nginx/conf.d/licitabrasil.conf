# HTTP → HTTPS redirect + ACME challenge
server {
    listen 80 default_server;
    server_name licitabrasilweb.com.br www.licitabrasilweb.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name licitabrasilweb.com.br www.licitabrasilweb.com.br;

    ssl_certificate     /etc/letsencrypt/live/licitabrasilweb.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/licitabrasilweb.com.br/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Static landing page assets
    root /usr/share/nginx/html;

    # API proxy
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Socket.IO
    location /socket.io/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Static site: landing page e cadastro
    location = / {
        try_files /index.html =404;
    }

    # Rotas estáticas sem extensão .html
    location = /login {
        try_files /login.html =404;
    }

    location = /cadastro {
        try_files /cadastro.html =404;
    }

    location = /recuperar-senha {
        try_files /recuperar-senha.html =404;
    }

    location = /contato {
        try_files /contato.html =404;
    }

    location ~* \.(css|js|html)$ {
        try_files $uri @react;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    location @react {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # React SPA — catch-all: qualquer rota autenticada não coberta acima
    # (orgao, fornecedor, banco-de-precos, organizacao, notifications, etc.)
    # Os location = /login, = /cadastro etc. têm prioridade por serem exact match.
    location / {
        proxy_pass http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}
